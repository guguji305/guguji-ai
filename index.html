<!DOCTYPE HTML>
<html>
<head>
	<title>咕咕鸡的 AI 作品集</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="stylesheet" href="assets/css/fontawesome-all.min.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	
	<style>
		/* ========== 1. 全局重置与深色主题统一 ========== */
		body {
			margin: 0; padding: 0; overflow: hidden;
			background: #121212; color: #e0e0e0;
			font-family: 'Source Sans Pro', sans-serif;
		}
		#app-container { display: flex; height: 100vh; width: 100vw; }

		#viewer { display: none !important; }

		/* ========== 2. 左侧实时幻灯片 Viewer (PC端) ========== */
		#left-viewer {
			width: 60%; height: 100%; background: #0a0a0a;
			display: flex; align-items: center; justify-content: center;
			position: relative; flex-shrink: 0;
			border-right: 1px solid #222;
		}
		#viewer-media {
			width: 92%; height: 92%;
			display: flex; align-items: center; justify-content: center;
		}
		#viewer-media img, #viewer-media video {
			max-width: 100%; max-height: 100%;
			object-fit: contain;
			border-radius: 4px;
			box-shadow: 0 15px 40px rgba(0,0,0,0.6);
			transition: opacity 0.6s ease-in-out;
		}
		.viewer-overlay {
			position: absolute; bottom: 30px; left: 0; right: 0;
			text-align: center; pointer-events: none;
		}
		#resume-slideshow {
			pointer-events: auto; padding: 10px 24px;
			background: rgba(255,255,255,0.1); color: #fff;
			border: 1px solid rgba(255,255,255,0.2); border-radius: 30px;
			cursor: pointer; display: none; backdrop-filter: blur(10px);
			transition: 0.3s; font-size: 0.9em; letter-spacing: 1px;
		}
		#resume-slideshow:hover { background: rgba(255,255,255,0.25); }
		#viewer-caption {
			color: rgba(255,255,255,0.5); margin-top: 15px;
			font-size: 0.85em; letter-spacing: 1px; text-transform: uppercase;
		}

		/* ========== 3. 右侧内容区 ========== */
		#right-content {
			width: 40%; height: 100%; overflow-y: auto;
			background: #181818; box-sizing: border-box;
		}
		#right-content::-webkit-scrollbar { width: 6px; }
		#right-content::-webkit-scrollbar-track { background: #111; }
		#right-content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

		.content-wrapper { padding: 3em 2em; max-width: 800px; margin: 0 auto; }
		header, footer { text-align: center; margin-bottom: 3em; }
		header h1 { font-size: 2.2em; color: #fff; margin-bottom: 0.2em; line-height: 1.2; }
		header p { color: #888; font-size: 1em; }

		/* 分类标签栏 */
		#category-tabs { text-align: center; margin: 2em 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
		#category-tabs button {
			padding: 8px 20px; border: 1px solid #333; border-radius: 20px;
			background: transparent; color: #aaa; font-weight: 600;
			cursor: pointer; transition: 0.2s; font-size: 0.85em;
		}
		#category-tabs button:hover { border-color: #666; color: #fff; }
		#category-tabs button.active { background: #fff; color: #000; border-color: #fff; }
		#category-tabs button.nsfw-tab { border-color: #500; color: #f88; }
		#category-tabs button.nsfw-tab.active { background: #c00; color: #fff; border-color: #c00; }

		/* 画廊网格 */
		.gallery-grid {
			display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
			gap: 12px; margin: 2em 0;
		}
		.img-wrapper {
			position: relative; border-radius: 8px; overflow: hidden;
			cursor: pointer; background: #222; aspect-ratio: 1/1;
			transition: transform 0.3s, box-shadow 0.3s;
		}
		.img-wrapper img {
			width: 100%; height: 100%; object-fit: cover; display: block;
			transition: transform 0.4s ease;
		}
		.img-wrapper .video-placeholder {
			width: 100%; height: 100%;
			background: #2a2a2a;
			display: flex; align-items: center; justify-content: center;
			color: #fff; font-size: 3em;
			transition: background 0.3s;
		}
		.img-wrapper:hover .video-placeholder { background: #444; }
		.img-wrapper:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
		.img-wrapper:hover img { transform: scale(1.08); }
		.img-wrapper.active { outline: 3px solid #007bff; outline-offset: -3px; }

		/* 删除按钮 */
		.delete-img-btn {
			position: absolute; top: 8px; right: 8px;
			background: rgba(220, 50, 50, 0.9); color: white;
			border: none; border-radius: 50%; width: 26px; height: 26px;
			font-size: 14px; line-height: 26px; text-align: center;
			cursor: pointer; display: none; z-index: 5;
		}
		body.admin-mode .delete-img-btn { display: block; }

		/* Footer */
		footer h2 { color: #fff; font-size: 1.5em; }
		footer p { color: #888; }
		footer .icons { list-style: none; padding: 0; display: flex; justify-content: center; gap: 20px; margin-top: 1.5em; }
		footer .icons a { color: #888; font-size: 1.5em; transition: 0.2s; }
		footer .icons a:hover { color: #fff; }

		/* ========== 4. 移动端专属全屏 Viewer ========== */
		#mobile-viewer {
			display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
			background: rgba(0,0,0,0.95); z-index: 2000;
			flex-direction: column; align-items: center; justify-content: center;
		}
		#mobile-viewer.active { display: flex; }
		#mobile-media {
			max-width: 95%; max-height: 80vh;
			display: flex; align-items: center; justify-content: center;
		}
		#mobile-media img, #mobile-media video { max-width: 100%; max-height: 100%; object-fit: contain; }
		#mobile-viewer .mv-controls {
			position: absolute; bottom: 30px; display: flex; gap: 20px; align-items: center;
		}
		#mobile-viewer .mv-btn {
			background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444;
			width: 50px; height: 50px; border-radius: 50%; font-size: 20px;
			display: flex; align-items: center; justify-content: center; cursor: pointer;
		}
		#mobile-viewer .mv-close { position: absolute; top: 20px; right: 20px; font-size: 30px; color: #fff; cursor: pointer; background: none; border: none; }

		/* ========== 5. 模态框（管理 & 年龄确认） ========== */
		.modal {
			display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
			background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center;
		}
		.modal.active { display: flex; }
		.modal-panel {
			background: #222; color: #eee; padding: 2em; border-radius: 12px;
			max-width: 450px; width: 90%; max-height: 90vh; overflow-y: auto;
			box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid #333;
			position: relative; text-align: center;
		}
		.modal-panel h3 { margin-top: 0; color: #fff; }
		.modal-panel input, .modal-panel select, .modal-panel button {
			margin: 6px 0; padding: 10px; border-radius: 6px;
			border: 1px solid #444; background: #111; color: #eee;
			width: 100%; box-sizing: border-box; font-size: 14px;
		}
		.modal-panel button { background: #fff; color: #000; font-weight: bold; cursor: pointer; border: none; }
		.modal-panel button:hover { background: #ddd; }
		.close-modal-btn { position: absolute; top: 10px; right: 15px; background: none !important; border: none; font-size: 24px; color: #888; cursor: pointer; width: auto; }
		.danger-btn { background: #c0392b !important; color: white !important; }
		#upload-status { margin-top: 15px; font-size: 0.85em; color: #aaa; background: #111; padding: 10px; border-radius: 6px; max-height: 120px; overflow-y: auto; }

		/* 年龄确认对话框特定 */
		#age-modal .buttons { display: flex; gap: 10px; justify-content: center; margin-top: 1.5em; }
		#age-modal button { width: auto; padding: 10px 30px; }

		/* ========== 6. 移动端响应式 ========== */
		@media (max-width: 900px) {
			body { overflow: auto; }
			#app-container { flex-direction: column; height: auto; }
			#left-viewer { display: none; }
			#right-content { width: 100%; height: auto; border: none; }
			.content-wrapper { padding: 2em 1em; }
			header h1 { font-size: 1.8em; }
			.gallery-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
		}
	</style>
</head>

	<!-- 主应用 -->
	<div id="app-container">

	<div id="age-modal" class="modal">
		<div class="modal-panel">
			<h3>🔞 内容警告</h3>
			<p>此区域包含成人内容，请确认您已年满18周岁。</p>
			<div class="buttons">
				<button onclick="confirmAge(true)">是，我已满18岁</button>

	<!-- Scripts -->
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/browser.min.js"></script>
	<script src="assets/js/breakpoints.min.js"></script>
	<script src="assets/js/main.js"></script>

	<script>
		// ========== 基础配置 ==========
		const host = window.location.host;
		const pathParts = window.location.pathname.split('/').filter(p => p);
		let owner = host.endsWith('.github.io') ? host.split('.')[0] : 'guguji305';
		let repo = host.endsWith('.github.io') ? (pathParts[0] || host) : 'guguji-ai';
		const branch = 'main';
		const tokenKey = 'github_token_for_uploader';
		const ageConfirmedKey = 'nsfw_age_confirmed';

		function getToken() { return localStorage.getItem(tokenKey); }
		function saveToken() {
			const token = document.getElementById('token-input').value.trim();
			if (token) { localStorage.setItem(tokenKey, token); alert('✅ Token 已保存！'); refreshCategoryList(); }
			else alert('请输入 Token');
		}

		let currentCategory = 'sfw';
		let categoryList = ['sfw', 'nsfw'];
		// 媒体数据：{ url, type: 'image'|'video', name }
		let mediaItems = [];
		let currentIndex = 0;
		let slideshowTimer = null;
		let isFixed = false;
		const isMobile = window.innerWidth <= 900;

		// ========== 分类 ==========
		async function fetchCategories() {
			const token = getToken();
			const headers = token ? { 'Authorization': `token ${token}` } : {};
			try {
				const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`, { headers });
				if (!res.ok) return JSON.parse(localStorage.getItem('custom_categories') || '["sfw","nsfw"]');
				const data = await res.json();
				const dirs = [];
				if (data.tree) data.tree.forEach(item => {
					if (item.path.startsWith('images/')) {
						const parts = item.path.split('/');
						if (parts.length >= 2 && parts[1] && !dirs.includes(parts[1])) dirs.push(parts[1]);
					}
				});
				if (!dirs.includes('sfw')) dirs.unshift('sfw');
				if (!dirs.includes('nsfw')) dirs.unshift('nsfw');
				return dirs;
			} catch (e) { return JSON.parse(localStorage.getItem('custom_categories') || '["sfw","nsfw"]'); }
		}

		async function refreshCategoryList() {
			categoryList = await fetchCategories();
			localStorage.setItem('custom_categories', JSON.stringify(categoryList));
			const select = document.getElementById('category-select');
			select.innerHTML = '';
			categoryList.forEach(cat => {
				const opt = document.createElement('option');
				opt.value = cat; opt.textContent = cat === 'nsfw' ? '🔞 NSFW' : cat;
				select.appendChild(opt);
			});
			renderCategoryTabs();
			if (!categoryList.includes(currentCategory)) currentCategory = categoryList[0];
			loadGallery(currentCategory);
		}

		function addCategory() {
			const name = document.getElementById('new-category-input').value.trim().toLowerCase().replace(/\s+/g, '_');
			if (!name) return alert('请输入名称');
			if (categoryList.includes(name)) return alert('已存在');
			categoryList.push(name);
			localStorage.setItem('custom_categories', JSON.stringify(categoryList));
			const select = document.getElementById('category-select');
			const opt = document.createElement('option'); opt.value = name; opt.textContent = name;
			select.appendChild(opt); select.value = name;
			renderCategoryTabs(); document.getElementById('new-category-input').value = '';
		}

		function renderCategoryTabs() {
			const container = document.getElementById('category-tabs');
			container.innerHTML = '';
			categoryList.forEach(cat => {
				const btn = document.createElement('button');
				btn.textContent = cat === 'nsfw' ? '🔞 NSFW' : cat;
				btn.className = (cat === currentCategory) ? 'active' : '';
				if (cat === 'nsfw') btn.classList.add('nsfw-tab');
				btn.onclick = () => {
					if (cat === 'nsfw' && !localStorage.getItem(ageConfirmedKey)) {
						openModal('age-modal');
					} else {
						currentCategory = cat;
						renderCategoryTabs();
						loadGallery(cat);
					}
				};
				container.appendChild(btn);
			});
		}

		// 年龄确认
		function confirmAge(confirmed) {
			closeModal('age-modal');
			if (confirmed) {
				localStorage.setItem(ageConfirmedKey, 'true');
				currentCategory = 'nsfw';
				renderCategoryTabs();
				loadGallery('nsfw');
			} else {
				// 保持当前分类
			}
		}

		// ========== 画廊与幻灯片 ==========
		async function loadGallery(category) {
			const container = document.getElementById('gallery-container');
			container.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color:#666;">⏳ 加载中...</p>';
			const headers = getToken() ? { 'Authorization': `token ${getToken()}` } : {};

			try {
				const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/images/${category}`, { headers });
				if (!res.ok) { container.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color:#666;">暂无作品</p>'; mediaItems=[]; startSlideshow(); return; }
				const files = await res.json();
				const supported = files.filter(f => f.type === 'file' && /\.(jpg|jpeg|png|gif|webp|mp4|webm|ogg|mov)$/i.test(f.name));

				container.innerHTML = '';
				if (supported.length === 0) {
					container.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color:#666;">暂无媒体</p>';
					mediaItems=[]; startSlideshow(); return;
				}

				mediaItems = supported.map(f => ({
					url: f.download_url,
					type: f.name.match(/\.(mp4|webm|ogg|mov)$/i) ? 'video' : 'image',
					name: f.name.replace(/\.[^/.]+$/, "").replace(/_/g, ' '),
					path: f.path,
					sha: f.sha
				}));
				currentIndex = 0;

				supported.forEach((file, i) => {
					const wrapper = document.createElement('div'); wrapper.className = 'img-wrapper';
					if (mediaItems[i].type === 'image') {
						const img = document.createElement('img'); img.src = file.download_url; img.loading = 'lazy';
						wrapper.appendChild(img);
					} else {
						const placeholder = document.createElement('div');
						placeholder.className = 'video-placeholder';
						placeholder.innerHTML = '▶';
						wrapper.appendChild(placeholder);
					}

					const del = document.createElement('button'); del.className = 'delete-img-btn'; del.innerHTML = '✕';
					del.onclick = (e) => { e.stopPropagation(); deleteFile(file.path, file.sha, file.name); };

					wrapper.onclick = () => {
						if (isMobile) openMobileViewer(i);
						else fixMedia(i);
					};
					wrapper.appendChild(del); container.appendChild(wrapper);
				});
				startSlideshow();
			} catch (e) { container.innerHTML = `<p style="color:red; grid-column: 1/-1;">⚠️ ${e.message}</p>`; }
		}

		function startSlideshow() {
			isFixed = false;
			document.getElementById('resume-slideshow').style.display = 'none';
			if (slideshowTimer) clearInterval(slideshowTimer);
			if (mediaItems.length === 0) {
				document.getElementById('viewer-media').innerHTML = '';
				return;
			}
			// 找到第一个图片作为起点，如果全是视频则停止
			let firstImgIdx = -1;
			for (let i = 0; i < mediaItems.length; i++) {
				if (mediaItems[i].type === 'image') { firstImgIdx = i; break; }
			}
			if (firstImgIdx === -1) {
				// 没有图片可自动播放，显示第一个视频（静态）
				displayMedia(0);
				return;
			}
			currentIndex = firstImgIdx;
			displayMedia(currentIndex);
			slideshowTimer = setInterval(() => {
				let next = (currentIndex + 1) % mediaItems.length;
				let attempts = 0;
				while (mediaItems[next].type === 'video' && attempts < mediaItems.length) {
					next = (next + 1) % mediaItems.length;
					attempts++;
				}
				if (attempts >= mediaItems.length) {
					// 只剩视频，停止自动播放
					clearInterval(slideshowTimer);
					return;
				}
				currentIndex = next;
				displayMedia(currentIndex);
			}, 4000);
		}

		function displayMedia(i) {
			const container = document.getElementById('viewer-media');
			const caption = document.getElementById('viewer-caption');
			const item = mediaItems[i];
			container.innerHTML = '';
			caption.textContent = item.name;

			if (item.type === 'image') {
				const img = document.createElement('img');
				img.src = item.url;
				img.style.opacity = 0;
				container.appendChild(img);
				setTimeout(() => { img.style.opacity = 1; }, 100);
			} else {
				const video = document.createElement('video');
				video.src = item.url;
				video.controls = true;
				video.style.maxWidth = '100%';
				video.style.maxHeight = '100%';
				container.appendChild(video);
				// 视频播放时暂停幻灯片
				if (slideshowTimer) clearInterval(slideshowTimer);
				isFixed = true;
				document.getElementById('resume-slideshow').style.display = 'inline-block';
				video.onplay = () => {}; // 可添加逻辑
			}
			highlightThumb(i);
			// 预加载下一张
			if (i + 1 < mediaItems.length) {
				const next = mediaItems[i + 1];
				if (next.type === 'image') {
					const preload = new Image(); preload.src = next.url;
				}
			}
		}

		function fixMedia(i) {
			isFixed = true;
			if (slideshowTimer) clearInterval(slideshowTimer);
			currentIndex = i;
			displayMedia(i);
			document.getElementById('resume-slideshow').style.display = 'inline-block';
		}

		function highlightThumb(i) {
			document.querySelectorAll('.img-wrapper').forEach((w, idx) => w.classList.toggle('active', idx === i));
		}

		document.getElementById('resume-slideshow').onclick = startSlideshow;

		// ========== 移动端查看器 ==========
		function openMobileViewer(i) {
			const container = document.getElementById('mobile-media');
			const item = mediaItems[i];
			container.innerHTML = '';
			if (item.type === 'image') {
				const img = document.createElement('img');
				img.src = item.url;
				container.appendChild(img);
			} else {
				const video = document.createElement('video');
				video.src = item.url;
				video.controls = true;
				container.appendChild(video);
			}
			document.getElementById('mobile-viewer').classList.add('active');
			mvIndex = i;
		}
		function closeMobileViewer() {
			document.getElementById('mobile-viewer').classList.remove('active');
			document.getElementById('mobile-media').innerHTML = '';
		}
		let mvIndex = 0;
		function mvNext() { mvIndex = (mvIndex + 1) % mediaItems.length; openMobileViewer(mvIndex); }
		function mvPrev() { mvIndex = (mvIndex - 1 + mediaItems.length) % mediaItems.length; openMobileViewer(mvIndex); }

		// ========== 文件操作 ==========
		async function deleteFile(path, sha, name) {
			if (!confirm(`删除 ${name}？`)) return;
			const token = getToken(); if (!token) return alert('需 Token');
			const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
				method: 'DELETE', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
				body: JSON.stringify({ message: `Delete ${name}`, sha, branch })
			});
			if (res.ok) { alert('已删除'); loadGallery(currentCategory); } else alert('删除失败');
		}

		async function deleteCategory() {
			const cat = document.getElementById('category-select').value;
			if (!confirm(`删除 ${cat} 所有文件？不可恢复！`)) return;
			const token = getToken(); if (!token) return alert('需 Token');
			const status = document.getElementById('upload-status'); status.textContent = '🗑️ 删除中...';
			const listRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/images/${cat}`, { headers: { 'Authorization': `token ${token}` } });
			if (!listRes.ok) { status.textContent = '❌ 无法读取文件列表'; return; }
			const files = await listRes.json();
			let deleted = 0;
			for (const f of files) {
				const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${f.path}`, {
					method: 'DELETE', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
					body: JSON.stringify({ message: `Delete ${f.name}`, sha: f.sha, branch })
				});
				if (r.ok) deleted++;
			}
			status.textContent = `✅ 已删除 ${deleted}/${files.length} 个文件`; refreshCategoryList();
		}

		async function uploadMedia() {
			const token = getToken(); if (!token) return alert('需 Token');
			const files = document.getElementById('file-input').files;
			const cat = document.getElementById('category-select').value;
			const status = document.getElementById('upload-status');
			if (!files.length) return alert('请选择文件');
			status.innerHTML = '⏳ 上传中...';
			const results = [];
			for (let i = 0; i < files.length; i++) {
				const f = files[i], name = f.name.replace(/\s+/g, '_');
				status.innerHTML = `⏳ ${i+1}/${files.length}: ${name}`;
				const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result.split(',')[1]); rd.readAsDataURL(f); });
				const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/images/${cat}/${name}`, {
					method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
					body: JSON.stringify({ message: `Upload ${name}`, content: b64, branch })
				});
				results.push(res.ok ? `✅ ${name}` : `❌ ${name}`);
			}
			status.innerHTML = results.join('<br>'); refreshCategoryList(); loadGallery(cat);
			document.getElementById('file-input').value = '';
		}

		// ========== 模态框控制 ==========
		function openModal(id) { document.getElementById(id).classList.add('active'); }
		function closeModal(id) { document.getElementById(id).classList.remove('active'); }

		// 管理快捷键
		window.addEventListener('keydown', e => {
			if (e.ctrlKey && e.shiftKey && e.key === 'U') {
				e.preventDefault();
				const modal = document.getElementById('upload-modal');
				modal.classList.toggle('active');
				document.body.classList.toggle('admin-mode');
				if (modal.classList.contains('active')) refreshCategoryList();
			}
			if (e.key === 'Escape') {
				closeModal('upload-modal');
				closeMobileViewer();
			}
		});

		// 点击模态框背景关闭
		document.querySelectorAll('.modal').forEach(m => {
			m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
		});

		// ========== 初始化 ==========
		window.addEventListener('load', async () => {
			const token = localStorage.getItem(tokenKey);
			if (token) document.getElementById('token-input').value = token;
			await refreshCategoryList();
		});
	</script>
</body>
</html>
