<!DOCTYPE HTML>
<html>
<head>
	<title>咕咕鸡的 AI 作品集</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	<style>
		/* 上传模态框 - 默认隐藏 */
		#upload-modal {
			display: none;
			position: fixed;
			top: 0; left: 0; width: 100%; height: 100%;
			background: rgba(0,0,0,0.7);
			z-index: 9999;
			justify-content: center;
			align-items: center;
		}
		#upload-modal.active {
			display: flex;
		}
		#upload-panel {
			background: #fff;
			color: #333;
			padding: 2em;
			border-radius: 12px;
			max-width: 420px;
			width: 90%;
			box-shadow: 0 15px 40px rgba(0,0,0,0.4);
			text-align: center;
			position: relative;
		}
		#upload-panel input, #upload-panel select, #upload-panel button {
			margin: 6px 0;
			padding: 10px;
			border-radius: 6px;
			border: 1px solid #ccc;
			width: 100%;
			box-sizing: border-box;
		}
		#upload-panel button {
			background: #222;
			color: white;
			cursor: pointer;
			border: none;
			font-weight: bold;
		}
		#upload-panel button:hover { background: #444; }
		#close-modal {
			position: absolute;
			top: 10px; right: 14px;
			background: none;
			border: none;
			font-size: 24px;
			color: #999;
			cursor: pointer;
		}

		.gallery {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			justify-content: center;
			margin: 1em 0;
		}
		.gallery img {
			max-width: 300px;
			height: auto;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.3);
		}
	</style>
</head>
<body>

	<div id="main">

		<!-- Header -->
		<header id="header">
			<h1>咕咕鸡<br />AI 绘画作品仓库</h1>
			<p>有好的作品会保存在这<br />有时间就更新</p>
			<ul class="actions">
				<li><a href="#sfw-gallery" class="arrow scrolly">往下看作品</a></li>
			</ul>
		</header>

		<!-- SFW 画廊 -->
		<section id="sfw-gallery" style="padding: 2em; text-align: center;">
			<h2>🖼️ 正常作品</h2>
			<div class="gallery" id="sfw-container"></div>
		</section>

		<!-- NSFW 按钮 + 画廊 -->
		<div style="text-align: center; margin: 2em;">
			<button id="show-nsfw" onclick="toggleNsfw()" style="padding: 10px 20px; font-size: 16px;">
				🔞 查看 NSFW 作品（需成年）
			</button>
		</div>
		<section id="nsfw-gallery" style="display: none; padding: 2em; text-align: center;">
			<h2>🔞 NSFW 作品</h2>
			<div class="gallery" id="nsfw-container"></div>
		</section>

		<!-- Footer -->
		<footer id="footer">
			<h2>联系我</h2>
			<p>对作品感兴趣？一起合作？发邮件或社交媒体找我。</p>
			<div>
				<a href="mailto:1599316531@qq.com">📧 邮箱</a>
				<a href="https://twitter.com/youraccount">🐦 Twitter</a>
				<a href="https://www.instagram.com/youraccount">📷 Instagram</a>
			</div>
		</footer>

	</div>

	<!-- 隐藏的上传模态框 -->
	<div id="upload-modal">
		<div id="upload-panel">
			<button id="close-modal">&times;</button>
			<h3>📤 上传新作品</h3>
			<p style="font-size:0.9em;">
				首次使用需粘贴 GitHub Token（保存在本地）：
			</p>
			<input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" />
			<button onclick="saveToken()">保存 Token</button>
			<input type="file" id="file-input" accept="image/*" />
			<select id="category-select">
				<option value="sfw">🖼️ 正常作品 (SFW)</option>
				<option value="nsfw">🔞 NSFW 作品</option>
			</select>
			<button onclick="uploadImage()">上传图片</button>
			<p id="upload-status" style="margin-top:10px; font-size:0.9em; color:#333;"></p>
		</div>
	</div>

	<!-- 必须脚本 -->
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/browser.min.js"></script>
	<script src="assets/js/breakpoints.min.js"></script>
	<script src="assets/js/main.js"></script>

	<!-- 上传逻辑 -->
	<script>
		// ========== 仓库信息解析 ==========
		const host = window.location.host;
		const pathParts = window.location.pathname.split('/').filter(p => p);
		let owner, repo;
		if (host.endsWith('.github.io')) {
			owner = host.split('.')[0];
			if (pathParts.length > 0) {
				repo = pathParts[0];
			} else {
				repo = host;
			}
		} else {
			// 自定义域名请手动修改这里
			owner = '你的GitHub用户名';
			repo = '你的仓库名';
		}

		// ========== Token 管理 ==========
		const tokenKey = 'github_token_for_uploader';
		function getToken() {
			return localStorage.getItem(tokenKey);
		}
		function saveToken() {
			const token = document.getElementById('token-input').value.trim();
			if (token) {
				localStorage.setItem(tokenKey, token);
				alert('✅ Token 已保存！');
				loadGallery('sfw');
				loadGallery('nsfw');
			}
		}

		// ========== NSFW 折叠 ==========
		function toggleNsfw() {
			const section = document.getElementById('nsfw-gallery');
			const btn = document.getElementById('show-nsfw');
			if (section.style.display === 'none') {
				section.style.display = 'block';
				btn.textContent = '🔞 隐藏 NSFW 作品';
				if (document.getElementById('nsfw-container').children.length === 0) {
					loadGallery('nsfw');
				}
			} else {
				section.style.display = 'none';
				btn.textContent = '🔞 查看 NSFW 作品（需成年）';
			}
		}

		// ========== 加载画廊 ==========
		async function loadGallery(category) {
			const container = document.getElementById(category + '-container');
			container.innerHTML = '<p>⏳ 加载中...</p>';

			const token = getToken();
			const headers = token ? { 'Authorization': `token ${token}` } : {};

			try {
				const url = `https://api.github.com/repos/${owner}/${repo}/contents/images/${category}`;
				const response = await fetch(url, { headers });
				if (!response.ok) {
					throw new Error('读取失败（可能需要 GitHub Token）');
				}
				const files = await response.json();
				container.innerHTML = '';
				if (!Array.isArray(files) || files.length === 0) {
					container.innerHTML = '<p>暂无作品，快去上传吧！</p>';
					return;
				}
				files.forEach(file => {
					if (file.type === 'file' && file.name.match(/\.(jpg|jpeg|png|gif|webp|svg)$/i)) {
						const img = document.createElement('img');
						img.src = file.download_url;
						img.alt = file.name;
						img.loading = 'lazy';
						container.appendChild(img);
					}
				});
			} catch (error) {
				container.innerHTML = `<p style="color:orange;">⚠️ ${error.message}</p>`;
			}
		}

		// ========== 上传图片 ==========
		async function uploadImage() {
			const token = getToken();
			if (!token) {
				alert('请先输入并保存 GitHub Token！');
				return;
			}

			const fileInput = document.getElementById('file-input');
			const category = document.getElementById('category-select').value;
			const status = document.getElementById('upload-status');

			if (!fileInput.files || fileInput.files.length === 0) {
				alert('请选择一张图片');
				return;
			}

			const file = fileInput.files[0];
			const fileName = file.name.replace(/\s+/g, '_');
			const path = `images/${category}/${fileName}`;

			status.textContent = '⏳ 正在上传...';
			const reader = new FileReader();
			reader.onload = async function(e) {
				const content = e.target.result.split(',')[1];
				try {
					const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
					const response = await fetch(url, {
						method: 'PUT',
						headers: {
							'Authorization': `token ${token}`,
							'Content-Type': 'application/json',
						},
						body: JSON.stringify({
							message: `Upload ${fileName}`,
							content: content,
							branch: 'main',   // 如果不是 main 分支请改成 master
						})
					});

					if (response.ok) {
						status.textContent = '✅ 上传成功！画廊即将刷新...';
						setTimeout(() => {
							loadGallery(category);
							// 可选自动关闭弹窗
							// closeModal();
						}, 1500);
					} else {
						const err = await response.json();
						status.textContent = `❌ 上传失败：${err.message}`;
					}
				} catch (error) {
					status.textContent = `❌ 网络错误：${error.message}`;
				}
			};
			reader.readAsDataURL(file);
		}

		// ========== 模态框控制（快捷键触发） ==========
		const modal = document.getElementById('upload-modal');
		document.getElementById('close-modal').addEventListener('click', () => {
			modal.classList.remove('active');
		});
		modal.addEventListener('click', (e) => {
			if (e.target === modal) modal.classList.remove('active');
		});

		// 键盘快捷键 Ctrl+Shift+U 打开上传弹窗
		window.addEventListener('keydown', (e) => {
			if (e.ctrlKey && e.shiftKey && e.key === 'U') {
				e.preventDefault(); // 防止浏览器默认行为（如打开源码面板）
				modal.classList.add('active');
			}
		});

		// ========== 页面初始化 ==========
		window.addEventListener('load', () => {
			loadGallery('sfw');
			const savedToken = localStorage.getItem(tokenKey);
			if (savedToken) {
				document.getElementById('token-input').value = savedToken;
			}
			// 控制台友好提示（可选）
			console.log('管理后台：按 Ctrl+Shift+U 打开上传面板');
		});
	</script>
</body>
</html>
