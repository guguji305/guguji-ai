<html>
<head>
	<title>咕咕鸡的 AI 作品集</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	<style>
		/* ========== 新增：左右分栏布局 ========== */
		body {
			overflow: hidden; /* 防止双滚动条 */
		}
		#app-container {
			display: flex;
			height: 100vh;
			width: 100vw;
			overflow: hidden;
		}

		/* 左侧 Viewer */
		#left-viewer {
			width: 55%;
			height: 100%;
			background: #1a1a1a;
			display: flex;
			align-items: center;
			justify-content: center;
			position: relative;
			flex-shrink: 0;
		}
		#viewer-img {
			max-width: 90%;
			max-height: 90%;
			object-fit: contain;
			transition: opacity 0.6s ease-in-out;
			box-shadow: 0 10px 30px rgba(0,0,0,0.5);
			border-radius: 4px;
		}
		.viewer-overlay {
			position: absolute;
			bottom: 30px;
			left: 0;
			right: 0;
			text-align: center;
			pointer-events: none;
		}
		#resume-slideshow {
			pointer-events: auto;
			padding: 10px 24px;
			background: rgba(255,255,255,0.15);
			color: white;
			border: 1px solid rgba(255,255,255,0.3);
			border-radius: 20px;
			cursor: pointer;
			display: none;
			backdrop-filter: blur(8px);
			transition: 0.2s;
			font-size: 0.95em;
		}
		#resume-slideshow:hover {
			background: rgba(255,255,255,0.3);
		}
		#viewer-caption {
			color: rgba(255,255,255,0.6);
			margin-top: 12px;
			font-size: 0.85em;
			letter-spacing: 0.5px;
		}

		/* 右侧内容区 */
		#right-content {
			width: 45%;
			height: 100%;
			overflow-y: auto;
			background: #f8f8f8;
		}
		
		/* 覆盖原模板 #main 的居中限制，使其适应右侧滚动 */
		#main {
			width: 100% !important;
			max-width: 100% !important;
			margin: 0 !important;
			padding: 2em !important;
			box-sizing: border-box;
			background: transparent !important;
		}
		#header, #footer {
			text-align: center;
		}

		/* ========== 分类标签栏 ========== */
		#category-tabs {
			text-align: center;
			margin: 1em 0;
			position: relative;
			z-index: 10;
		}
		#category-tabs button {
			margin: 4px;
			padding: 6px 16px;
			border: none;
			border-radius: 20px;
			background: rgba(0,0,0,0.05);
			color: #555;
			font-weight: bold;
			cursor: pointer;
			transition: 0.2s;
			font-size: 0.9em;
		}
		#category-tabs button.active {
			background: #222;
			color: white;
		}
		#category-tabs button.nsfw-tab {
			background: rgba(200,0,0,0.1);
			color: #c00;
		}
		#category-tabs button.nsfw-tab.active {
			background: #c00;
			color: white;
		}

		/* ========== 动态画廊 (右侧网格) ========== */
		.gallery {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
			gap: 12px;
			justify-content: center;
			margin: 1em 0;
			padding: 0;
		}
		.img-wrapper {
			position: relative;
			display: inline-block;
			cursor: pointer;
			border-radius: 8px;
			overflow: hidden;
			transition: transform 0.2s, box-shadow 0.2s;
		}
		.img-wrapper img {
			width: 100%;
			height: 140px;
			object-fit: cover;
			display: block;
			transition: transform 0.3s;
		}
		.img-wrapper:hover {
			transform: translateY(-3px);
			box-shadow: 0 6px 15px rgba(0,0,0,0.15);
		}
		.img-wrapper:hover img {
			transform: scale(1.05);
		}
		/* 当前选中/播放的图片高亮 */
		.img-wrapper.active {
			outline: 3px solid #007bff;
			outline-offset: -3px;
		}
		
		/* 删除按钮（管理模式显示） */
		.delete-img-btn {
			position: absolute;
			top: 6px;
			right: 6px;
			background: rgba(255,0,0,0.8);
			color: white;
			border: none;
			border-radius: 50%;
			width: 24px;
			height: 24px;
			font-size: 14px;
			line-height: 24px;
			text-align: center;
			cursor: pointer;
			display: none;
			z-index: 5;
		}
		body.admin-mode .delete-img-btn {
			display: block;
		}

		/* 隐藏原模板的全屏查看器，防止原 JS 报错 */
		.viewer {
			display: none !important;
		}

		/* ========== 上传模态框 ========== */
		#upload-modal {
			display: none;
			position: fixed;
			top: 0; left: 0; width: 100%; height: 100%;
			background: rgba(0,0,0,0.7);
			z-index: 9999;
			justify-content: center;
			align-items: center;
		}
		#upload-modal.active {
			display: flex;
		}
		#upload-panel {
			background: #fff;
			color: #333;
			padding: 2em;
			border-radius: 12px;
			max-width: 480px;
			width: 90%;
			box-shadow: 0 20px 40px rgba(0,0,0,0.5);
			text-align: center;
			position: relative;
			max-height: 90vh;
			overflow-y: auto;
		}
		#upload-panel input, #upload-panel select, #upload-panel button {
			margin: 8px 0;
			padding: 10px;
			border-radius: 6px;
			border: 1px solid #ccc;
			width: 100%;
			box-sizing: border-box;
		}
		#upload-panel button {
			background: #222;
			color: white;
			cursor: pointer;
			border: none;
			font-weight: bold;
		}
		#upload-panel button:hover { background: #444; }
		#close-modal {
			position: absolute;
			top: 10px; right: 14px;
			background: none !important;
			border: none;
			font-size: 28px;
			color: #999;
			cursor: pointer;
			width: auto;
		}
		.hint { font-size: 0.9em; opacity: 0.7; }
		.danger-btn { background: #c0392b !important; }
		.danger-btn:hover { background: #e74c3c !important; }

		/* ========== 移动端响应式适配 ========== */
		@media (max-width: 900px) {
			body { overflow: auto; }
			#app-container {
				flex-direction: column;
				height: auto;
				overflow: visible;
			}
			#left-viewer {
				width: 100%;
				height: 50vh;
				position: sticky;
				top: 0;
				z-index: 100;
			}
			#right-content {
				width: 100%;
				height: auto;
				overflow: visible;
			}
			.gallery {
				grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
			}
			.img-wrapper img {
				height: 100px;
			}
		}
	</style>
</head>
<body class="is-preload-0 is-preload-1 is-preload-2">

	<div id="app-container">
		
		<!-- 左侧 Viewer (自动幻灯片) -->

	<!-- 隐藏的原模板查看器（防止原 main.js 报错） -->

	<!-- 管理模态框 -->
	<div id="upload-modal">
		<div id="upload-panel">
			<button id="close-modal">&times;</button>
			<h3>🔧 作品集管理</h3>
			<div style="text-align: left;">
				<label>🔑 GitHub Token <span class="hint">（自动保存）</span></label>
				<input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" />

			<p id="upload-status" style="margin-top:10px; font-size:0.9em; color:#333;"></p>

	<!-- Scripts -->
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/browser.min.js"></script>
	<script src="assets/js/breakpoints.min.js"></script>
	<script src="assets/js/main.js"></script>

	<script>
		// ========== 仓库信息 ==========
		const host = window.location.host;
		const pathParts = window.location.pathname.split('/').filter(p => p);
		let owner, repo;
		if (host.endsWith('.github.io')) {
			owner = host.split('.')[0];
			repo = pathParts.length > 0 ? pathParts[0] : host;
		} else {
			owner = 'guguji305';
			repo = 'guguji-ai';
		}
		const branch = 'main';

		const tokenKey = 'github_token_for_uploader';
		function getToken() { return localStorage.getItem(tokenKey); }
		function saveToken() {
			const token = document.getElementById('token-input').value.trim();
			if (token) {
				localStorage.setItem(tokenKey, token);
				alert('✅ Token 已保存！');
				refreshCategoryList();
			} else {
				alert('请输入 Token');
			}
		}

		let currentCategory = 'sfw';
		let categoryList = ['sfw', 'nsfw'];

		async function fetchCategories() {
			const token = getToken();
			const headers = token ? { 'Authorization': `token ${token}` } : {};
			const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
			try {
				const res = await fetch(url, { headers });
				if (!res.ok) return JSON.parse(localStorage.getItem('custom_categories') || '["sfw","nsfw"]');
				const data = await res.json();
				const dirs = [];
				if (data.tree) {
					data.tree.forEach(item => {
						if (item.path.startsWith('images/')) {
							const parts = item.path.split('/');
							if (parts.length >= 2 && !dirs.includes(parts[1])) dirs.push(parts[1]);
						}
					});
				}
				if (!dirs.includes('sfw')) dirs.unshift('sfw');
				if (!dirs.includes('nsfw')) dirs.unshift('nsfw');
				return dirs;
			} catch (e) {
				return JSON.parse(localStorage.getItem('custom_categories') || '["sfw","nsfw"]');
			}
		}

		async function refreshCategoryList() {
			const categories = await fetchCategories();
			categoryList = categories;
			localStorage.setItem('custom_categories', JSON.stringify(categories));
			const select = document.getElementById('category-select');
			select.innerHTML = '';
			categories.forEach(cat => {
				const opt = document.createElement('option');
				opt.value = cat;
				opt.textContent = cat === 'nsfw' ? '🔞 NSFW' : cat;
				select.appendChild(opt);
			});
			renderCategoryTabs(categories);
			if (!categories.includes(currentCategory)) currentCategory = categories[0];
			loadGallery(currentCategory);
		}

		function addCategory() {
			const input = document.getElementById('new-category-input');
			const name = input.value.trim();
			if (!name) return alert('请输入分类名称');
			if (categoryList.includes(name)) return alert('此分类已存在');
			categoryList.push(name);
			localStorage.setItem('custom_categories', JSON.stringify(categoryList));
			const select = document.getElementById('category-select');
			const opt = document.createElement('option');
			opt.value = name;
			opt.textContent = name;
			select.appendChild(opt);
			select.value = name;
			renderCategoryTabs(categoryList);
			input.value = '';
		}

		function renderCategoryTabs(categories) {
			const container = document.getElementById('category-tabs');
			container.innerHTML = '';
			categories.forEach(cat => {
				const btn = document.createElement('button');
				btn.textContent = cat === 'nsfw' ? '🔞 NSFW' : cat;
				btn.className = (cat === currentCategory) ? 'active' : '';
				if (cat === 'nsfw') btn.classList.add('nsfw-tab');
				btn.onclick = () => switchCategory(cat);
				container.appendChild(btn);
			});
		}

		function switchCategory(category) {
			currentCategory = category;
			document.querySelectorAll('#category-tabs button').forEach(btn => {
				btn.classList.remove('active');
				if (btn.textContent === (category === 'nsfw' ? '🔞 NSFW' : category)) btn.classList.add('active');
			});
			loadGallery(category);
		}

		// ========== 幻灯片与 Viewer 逻辑 ==========
		let slideshowTimer = null;
		let currentImageIndex = 0;
		let imageUrls = [];
		let imageNames = [];
		let isFixedMode = false;

		function preloadImage(url) {
			const img = new Image();
			img.src = url;
		}

		function startSlideshow() {
			isFixedMode = false;
			document.getElementById('resume-slideshow').style.display = 'none';
			if (slideshowTimer) clearInterval(slideshowTimer);
			
			if (imageUrls.length === 0) {
				document.getElementById('viewer-img').src = '';
				document.getElementById('viewer-caption').textContent = '暂无图片';
				return;
			}

			showImage(currentImageIndex);

			slideshowTimer = setInterval(() => {
				currentImageIndex = (currentImageIndex + 1) % imageUrls.length;
				showImage(currentImageIndex);
			}, 4000); // 4秒切换一次
		}

		function showImage(index) {
			const viewerImg = document.getElementById('viewer-img');
			const caption = document.getElementById('viewer-caption');
			
			viewerImg.style.opacity = 0;
			setTimeout(() => {
				viewerImg.src = imageUrls[index];
				caption.textContent = imageNames[index] || '';
				viewerImg.style.opacity = 1;
				
				// 预加载下一张
				const nextIndex = (index + 1) % imageUrls.length;
				preloadImage(imageUrls[nextIndex]);
				
				// 高亮右侧缩略图
				highlightThumbnail(index);
			}, 300);
		}

		function highlightThumbnail(index) {
			document.querySelectorAll('.img-wrapper').forEach((w, i) => {
				if (i === index) w.classList.add('active');
				else w.classList.remove('active');
			});
		}

		function fixImage(url, name, index) {
			isFixedMode = true;
			if (slideshowTimer) clearInterval(slideshowTimer);
			currentImageIndex = index;
			
			const viewerImg = document.getElementById('viewer-img');
			const caption = document.getElementById('viewer-caption');
			
			viewerImg.style.opacity = 0;
			setTimeout(() => {
				viewerImg.src = url;
				caption.textContent = name;
				viewerImg.style.opacity = 1;
				highlightThumbnail(index);
			}, 150);

			document.getElementById('resume-slideshow').style.display = 'inline-block';
		}

		// 恢复幻灯片按钮事件
		document.getElementById('resume-slideshow').addEventListener('click', () => {
			startSlideshow();
		});

		// ========== 画廊加载逻辑 ==========
		async function loadGallery(category) {
			const container = document.getElementById('gallery-container');
			container.innerHTML = '<p>⏳ 加载中...</p>';
			const token = getToken();
			const headers = token ? { 'Authorization': `token ${token}` } : {};
			try {
				const url = `https://api.github.com/repos/${owner}/${repo}/contents/images/${category}`;
				const res = await fetch(url, { headers });
				if (!res.ok) {
					if (res.status === 404) {
						container.innerHTML = '<p>这个作品集还是空的，快去上传吧！</p>';
						imageUrls = []; imageNames = []; startSlideshow();
						return;
					}
					throw new Error(`读取失败 (${res.status})`);
				}
				const files = await res.json();
				if (!Array.isArray(files) || files.length === 0) {
					container.innerHTML = '<p>暂无作品</p>';
					imageUrls = []; imageNames = []; startSlideshow();
					return;
				}
				const imageFiles = files.filter(f => f.type === 'file' && f.name.match(/\.(jpg|jpeg|png|gif|webp|svg)$/i));
				container.innerHTML = '';
				if (imageFiles.length === 0) {
					container.innerHTML = '<p>暂无图片</p>';
					imageUrls = []; imageNames = []; startSlideshow();
					return;
				}

				// 收集 URL 用于幻灯片
				imageUrls = imageFiles.map(f => f.download_url);
				imageNames = imageFiles.map(f => f.name);
				currentImageIndex = 0;

				imageFiles.forEach((file, index) => {
					const wrapper = document.createElement('div');
					wrapper.className = 'img-wrapper';

					const img = document.createElement('img');
					img.src = file.download_url;
					img.alt = file.name;
					img.loading = 'lazy';

					const delBtn = document.createElement('button');
					delBtn.className = 'delete-img-btn';
					delBtn.innerHTML = '✕';
					delBtn.title = '删除此图片';
					delBtn.onclick = (e) => {
						e.stopPropagation();
						deleteImage(file.path, file.sha, file.name);
					};

					// 点击固定图片
					wrapper.onclick = () => fixImage(file.download_url, file.name, index);

					wrapper.appendChild(img);
					wrapper.appendChild(delBtn);
					container.appendChild(wrapper);
				});

				// 启动幻灯片
				startSlideshow();

			} catch (error) {
				container.innerHTML = `<p style="color:red;">⚠️ ${error.message}</p>`;
			}
		}

		async function deleteImage(path, sha, fileName) {
			if (!confirm(`确定要删除 "${fileName}" 吗？此操作不可恢复！`)) return;
			const token = getToken();
			if (!token) return alert('请先保存 GitHub Token');
			try {
				const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
					method: 'DELETE',
					headers: {
						'Authorization': `token ${token}`,
						'Content-Type': 'application/json'
					},
					body: JSON.stringify({ message: `Delete ${fileName}`, sha, branch })
				});
				if (res.ok) {
					alert(`已删除 ${fileName}`);
					loadGallery(currentCategory);
				} else {
					const err = await res.json();
					alert(`删除失败：${err.message}`);
				}
			} catch (error) {
				alert(`网络错误：${error.message}`);
			}
		}

		async function deleteCategory() {
			const category = document.getElementById('category-select').value;
			if (!confirm(`⚠️ 将删除“${category}”作品集及其所有图片！\n此操作不可恢复，确定继续吗？`)) return;
			const token = getToken();
			if (!token) return alert('请先保存 GitHub Token');
			const status = document.getElementById('upload-status');
			status.textContent = `🗑️ 正在删除“${category}”中的所有文件...`;
			try {
				const listRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/images/${category}`, {
					headers: { 'Authorization': `token ${token}` }
				});
				if (!listRes.ok) throw new Error(`无法获取文件列表 (${listRes.status})`);
				const files = await listRes.json();
				if (!Array.isArray(files) || files.length === 0) {
					status.textContent = '✅ 分类已空，可直接移除。';
					await refreshCategoryList();
					return;
				}
				let deleted = 0;
				for (const file of files) {
					const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file.path}`, {
						method: 'DELETE',
						headers: {
							'Authorization': `token ${token}`,
							'Content-Type': 'application/json'
						},
						body: JSON.stringify({ message: `Delete ${file.name}`, sha: file.sha, branch })
					});
					if (res.ok) deleted++;
					else console.warn(`删除 ${file.name} 失败`);
				}
				status.textContent = `✅ 已删除 ${deleted}/${files.length} 个文件，分类已清空。`;
				await refreshCategoryList();
			} catch (error) {
				status.textContent = `❌ 删除分类失败：${error.message}`;
			}
		}

		async function uploadImages() {
			const token = getToken();
			if (!token) return alert('请先输入并保存 GitHub Token！');
			const fileInput = document.getElementById('file-input');
			const category = document.getElementById('category-select').value;
			const status = document.getElementById('upload-status');
			if (!fileInput.files || fileInput.files.length === 0) return alert('请至少选择一张图片');
			status.textContent = `⏳ 正在上传 ${fileInput.files.length} 个文件...`;
			const results = [];
			for (let i = 0; i < fileInput.files.length; i++) {
				const file = fileInput.files[i];
				const fileName = file.name.replace(/\s+/g, '_');
				const path = `images/${category}/${fileName}`;
				status.textContent = `⏳ 上传中 (${i+1}/${fileInput.files.length}): ${fileName}`;
				try {
					const content = await readFileAsBase64(file);
					const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
						method: 'PUT',
						headers: {
							'Authorization': `token ${token}`,
							'Content-Type': 'application/json'
						},
						body: JSON.stringify({ message: `Upload ${fileName}`, content, branch })
					});
					if (res.ok) results.push(`✅ ${fileName}`);
					else {
						const err = await res.json();
						results.push(`❌ ${fileName}: ${err.message}`);
					}
				} catch (error) {
					results.push(`❌ ${fileName}: ${error.message}`);
				}
			}
			status.innerHTML = results.join('<br>');
			await refreshCategoryList();
			loadGallery(category);
			fileInput.value = '';
		}

		function readFileAsBase64(file) {
			return new Promise((resolve, reject) => {
				const reader = new FileReader();
				reader.onload = () => resolve(reader.result.split(',')[1]);
				reader.onerror = reject;
				reader.readAsDataURL(file);
			});
		}

		// ========== 管理模态框快捷键 ==========
		const modal = document.getElementById('upload-modal');
		function openAdminPanel() {
			modal.classList.add('active');
			document.body.classList.add('admin-mode');
			refreshCategoryList();
		}
		function closeAdminPanel() {
			modal.classList.remove('active');
			document.body.classList.remove('admin-mode');
		}
		document.getElementById('close-modal').addEventListener('click', closeAdminPanel);
		modal.addEventListener('click', e => { if (e.target === modal) closeAdminPanel(); });
		window.addEventListener('keydown', e => {
			if (e.ctrlKey && e.shiftKey && e.key === 'U') {
				e.preventDefault();
				modal.classList.contains('active') ? closeAdminPanel() : openAdminPanel();
			}
		});

		// ========== 初始化 ==========
		window.addEventListener('load', async () => {
			const savedToken = localStorage.getItem(tokenKey);
			if (savedToken) document.getElementById('token-input').value = savedToken;
			await refreshCategoryList();
			switchCategory(categoryList.includes('sfw') ? 'sfw' : categoryList[0]);
		});
	</script>
</body>
</html>
