<!DOCTYPE HTML>
<html>
<head>
	<title>咕咕鸡的 AI 作品集</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	<style>
		/* 强制显示上传区域 */
		#upload-section {
			background: rgba(0,0,0,0.7);
			color: #fff;
			padding: 1.5em;
			border-radius: 8px;
			max-width: 500px;
			margin: 2em auto;
			text-align: center;
			position: relative;
			z-index: 999;
		}
		#upload-section input, #upload-section select, #upload-section button {
			margin: 5px;
			padding: 8px 12px;
			border-radius: 4px;
			border: none;
		}
		#token-input {
			width: 70%;
		}
		.gallery {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			justify-content: center;
			margin: 1em 0;
		}
		.gallery img {
			max-width: 300px;
			height: auto;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.3);
		}
	</style>
</head>
<body>

	<div id="main">

		<!-- Header -->
		<header id="header">
			<h1>咕咕鸡<br />AI 绘画作品仓库</h1>
			<p>有好的作品会保存在这<br />有时间就更新</p>
			<ul class="actions">
				<li><a href="#sfw-gallery" class="arrow scrolly">往下看作品</a></li>
			</ul>
		</header>

		<!-- 🔼 上传区域（现在会明显显示在 Header 下方） -->
		<div id="upload-section">
			<h3>📤 上传新作品</h3>
			<p style="font-size:0.9em;">
				首次使用需粘贴 GitHub Token（保存在本地）：<br>
				<input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" />
				<button onclick="saveToken()">保存 Token</button>
			</p>
			<input type="file" id="file-input" accept="image/*" />
			<select id="category-select">
				<option value="sfw">🖼️ 正常作品 (SFW)</option>
				<option value="nsfw">🔞 NSFW 作品</option>
			</select>
			<button onclick="uploadImage()">上传图片</button>
			<p id="upload-status" style="margin-top:10px; font-size:0.9em;"></p>
		</div>

		<!-- SFW 画廊 -->
		<section id="sfw-gallery" style="padding: 2em; text-align: center;">
			<h2>🖼️ 正常作品</h2>
			<div class="gallery" id="sfw-container"></div>
		</section>

		<!-- NSFW 按钮 + 画廊 -->
		<div style="text-align: center; margin: 2em;">
			<button id="show-nsfw" onclick="toggleNsfw()" style="padding: 10px 20px; font-size: 16px;">
				🔞 查看 NSFW 作品（需成年）
			</button>
		</div>
		<section id="nsfw-gallery" style="display: none; padding: 2em; text-align: center;">
			<h2>🔞 NSFW 作品</h2>
			<div class="gallery" id="nsfw-container"></div>
		</section>

		<!-- Footer -->
		<footer id="footer">
			<h2>联系我</h2>
			<p>对作品感兴趣？一起合作？发邮件或社交媒体找我。</p>
			<div>
				<a href="mailto:1599316531@qq.com">📧 邮箱</a>
				<a href="https://twitter.com/youraccount">🐦 Twitter</a>
				<a href="https://www.instagram.com/youraccount">📷 Instagram</a>
			</div>
		</footer>

	</div>

	<!-- 必须的脚本 -->
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/browser.min.js"></script>
	<script src="assets/js/breakpoints.min.js"></script>
	<script src="assets/js/main.js"></script>

	<!-- 🔧 核心逻辑：加载 & 上传 -->
	<script>
		// ========== 解析仓库信息 ==========
		const host = window.location.host;
		const pathParts = window.location.pathname.split('/').filter(p => p);
		let owner, repo;
		if (host.endsWith('.github.io')) {
			owner = host.split('.')[0];
			if (pathParts.length > 0) {
				repo = pathParts[0];
			} else {
				repo = host;
			}
		} else {
			// 如果是自定义域名，请手动修改下面两行
			owner = '你的GitHub用户名';
			repo = '你的仓库名';
		}

		// ========== Token 管理 ==========
		const tokenKey = 'github_token_for_uploader';
		function getToken() {
			return localStorage.getItem(tokenKey);
		}
		function saveToken() {
			const token = document.getElementById('token-input').value.trim();
			if (token) {
				localStorage.setItem(tokenKey, token);
				alert('✅ Token 已保存！');
				loadGallery('sfw');
				loadGallery('nsfw');
			}
		}

		// ========== NSFW 折叠 ==========
		function toggleNsfw() {
			const section = document.getElementById('nsfw-gallery');
			const btn = document.getElementById('show-nsfw');
			if (section.style.display === 'none') {
				section.style.display = 'block';
				btn.textContent = '🔞 隐藏 NSFW 作品';
				if (document.getElementById('nsfw-container').children.length === 0) {
					loadGallery('nsfw');
				}
			} else {
				section.style.display = 'none';
				btn.textContent = '🔞 查看 NSFW 作品（需成年）';
			}
		}

		// ========== 加载图片列表 ==========
		async function loadGallery(category) {
			const container = document.getElementById(category + '-container');
			container.innerHTML = '<p>⏳ 加载中...</p>';

			const token = getToken();
			const headers = token ? { 'Authorization': `token ${token}` } : {};

			try {
				const url = `https://api.github.com/repos/${owner}/${repo}/contents/images/${category}`;
				const response = await fetch(url, { headers });
				if (!response.ok) {
					throw new Error('读取失败（可能需要 GitHub Token）');
				}
				const files = await response.json();
				container.innerHTML = '';
				if (!Array.isArray(files) || files.length === 0) {
					container.innerHTML = '<p>暂无作品，快去上传吧！</p>';
					return;
				}
				files.forEach(file => {
					if (file.type === 'file' && file.name.match(/\.(jpg|jpeg|png|gif|webp|svg)$/i)) {
						const img = document.createElement('img');
						img.src = file.download_url;
						img.alt = file.name;
						img.loading = 'lazy';
						container.appendChild(img);
					}
				});
			} catch (error) {
				container.innerHTML = `<p style="color:orange;">⚠️ ${error.message}</p>`;
			}
		}

		// ========== 上传图片 ==========
		async function uploadImage() {
			const token = getToken();
			if (!token) {
				alert('请先输入并保存 GitHub Token！');
				return;
			}

			const fileInput = document.getElementById('file-input');
			const category = document.getElementById('category-select').value;
			const status = document.getElementById('upload-status');

			if (!fileInput.files || fileInput.files.length === 0) {
				alert('请选择一张图片');
				return;
			}

			const file = fileInput.files[0];
			const fileName = file.name.replace(/\s+/g, '_');
			const path = `images/${category}/${fileName}`;

			status.textContent = '⏳ 正在上传...';
			const reader = new FileReader();
			reader.onload = async function(e) {
				const content = e.target.result.split(',')[1];
				try {
					const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
					const response = await fetch(url, {
						method: 'PUT',
						headers: {
							'Authorization': `token ${token}`,
							'Content-Type': 'application/json',
						},
						body: JSON.stringify({
							message: `Upload ${fileName}`,							消息: `上传 ${文件名}`,
							content: content,
							branch: 'main',   // 如果不是 main 分支，请改成 master 或其他							分支: 'main',   // 如果不是 main 分支，请改成 master 或其他
						})
					});

					if (response.ok) {					如果 (response.ok好的) {
						status.textContent = `✅ 上传成功！画廊正在刷新...`;
						setTimeout(() => loadGallery(category), 1500);
					} else {
						const err = await response.json();
						status.textContent = `❌ 上传失败：${err.message}`;
					}
				} catch (error) {
					status.textContent = `❌ 网络错误：${error.message}`;
				}
			};
			reader.readAsDataURL(file);
		}

		// ========== 页面加载完毕 ==========
		window.addEventListener('load', () => {
			// 自动载入 SFW 画廊
			loadGallery('sfw');
			// 如果之前保存过 Token，自动填入输入框（方便识别）
			const savedToken = localStorage.getItem(tokenKey);
			if (savedToken) {
				document.getElementById('token-input').value = savedToken;				文档.getElementById('token-input').值 = 已保存的令牌;
			}
		});
	</script>
</body>
</html>
